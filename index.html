<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação de iPhone – Upgrade</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
  background: #f2f2f7;
  padding: 20px;
}
.container {
  background: #ffffff;
  border-radius: 22px;
  padding: 22px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
}
h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
}
label {
  margin-top: 14px;
  display: block;
  font-weight: 600;
  font-size: 14px;
}
input, select, button {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 14px;
  border: 1px solid #d1d1d6;
  font-size: 16px;
  box-sizing: border-box;
}
button {
  background: #000;
  color: #fff;
  margin-top: 18px;
  font-weight: 600;
  cursor: pointer;
}
.result {
  margin-top: 22px;
  padding: 18px;
  border-radius: 18px;
}
.aprovado {
  background: #e6f4ea;
  color: #0f5132;
}
.reprovado {
  background: #fce8e6;
  color: #842029;
}
pre {
  white-space: pre-wrap;
  font-size: 15px;
  margin-top: 10px;
}
.actions button {
  margin-top: 10px;
}
.whatsapp {
  background: #25D366;
}
.copy {
  background: #007aff;
}

/* Campo com botão ao lado */
.input-group {
  display: flex;
  gap: 8px;
  align-items: center;
}
.input-group input {
  flex: 1;
}
.toggle-olho {
  width: 50px;
  border-radius: 14px;
  border: 1px solid #d1d1d6;
  background: #f2f2f7;
  font-size: 18px;
  cursor: pointer;
}
.toggle-olho:hover {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  
<h1>📱 Avaliação de iPhone</h1>

<label>Modelo de Entrada</label>
<input id="modeloEntrada" placeholder="iPhone 15 Pro Max - 256GB - Preto">

<label>Revenda (R$)</label>
<div class="input-group">
  <input id="valorFornecedor" type="password" inputmode="numeric" autocomplete="off">
  <button type="button" class="toggle-olho" onclick="toggleFornecedor()">👁</button>
</div>

<label>Saúde da bateria (%)</label>
<input id="bateria" type="number">

<label>Possui Nota Fiscal?</label>
<select id="nota">
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Já teve reparo?</label>
<select id="reparo">
  <option>Não</option>
  <option>Sim</option>
</select>

<label>Possui caixa?</label>
<select id="caixa">
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Cor</label>
<select id="cor">
  <option>Preto</option>
  <option>Branco</option>
  <option>Azul</option>
  <option>Verde</option>
  <option>Lilás</option>
  <option>Amarelo</option>
  <option>Vermelho</option>
  <option>Rosa</option>
</select>

<label>Avarias do aparelho</label>
<select id="avaria">
  <option>Sem avarias</option>
  <option>Arranhado</option>
  <option>Trincado</option>
  <option>Defeito</option>
</select>

<label>Aplicar?</label>
<select id="desval">
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Modelo desejado</label>
<input id="modeloDesejado" placeholder="iPhone 16 Pro Max - 256GB - Lacrado">

<label>Valor do iPhone desejado (R$)</label>
<input id="valorNovo" type="number">

<button onclick="avaliar()">Avaliar Upgrade</button>

<div id="resultado"></div>
</div>

<script>
function toggleFornecedor() {
  const input = document.getElementById("valorFornecedor");
  const btn = document.querySelector(".toggle-olho");

  if (input.type === "password") {
    input.type = "text";
    btn.textContent = "🙈";
  } else {
    input.type = "password";
    btn.textContent = "👁";
  }
}

function avaliar() {
  let valorFornecedor = Number(valorFornecedorInput.value);
  let bateria = Number(bateriaInput.value);
  let nota = notaInput.value;
  let reparo = reparoInput.value;
  let caixa = caixaInput.value;
  let cor = corInput.value;
  let desval = desvalInput.value;
  let avaria = avariaInput.value;

  let modeloEntrada = modeloEntradaInput.value;
  let modeloDesejado = modeloDesejadoInput.value;
  let valorNovo = Number(valorNovoInput.value);

  let valorAvaliado = valorFornecedor;
  let aprovado = true;

  if (nota === "Não" || reparo === "Sim") aprovado = false;
  if (avaria === "Trincado" || avaria === "Defeito") aprovado = false;

  if (aprovado) {
    if (bateria < 86) valorAvaliado -= 300;
    else if (bateria <= 89) valorAvaliado -= 150;

    if (caixa === "Não") valorAvaliado -= 100;
    if (["Lilás","Amarelo","Vermelho","Rosa"].includes(cor)) valorAvaliado -= 100;
    if (desval === "Sim") valorAvaliado -= 200;
  }

  let resultado = document.getElementById("resultado");

  if (!aprovado || valorAvaliado <= 0) {
    resultado.innerHTML = `
      <div class="result reprovado">
        <h3>😞 Upgrade não aprovado</h3>
        <p>Este aparelho não atende aos critérios para entrada no momento.</p>
      </div>
    `;
    return;
  }

  let diferenca = valorNovo - valorAvaliado;

  let mensagem = `Olá, venho com uma boa notícia! 😊
Seu aparelho foi aceito como parte do valor para adquirir seu novo iPhone conosco. ✅

OFERTA UPGRADE 🔄

DE ENTRADA: ${modeloEntrada}
(valor avaliado: R$ ${valorAvaliado.toLocaleString("pt-BR")})

DESEJA ADQUIRIR: ${modeloDesejado}
(valor do desejado: R$ ${valorNovo.toLocaleString("pt-BR")})

DIFERENÇA / ENTRADA: R$ ${diferenca.toLocaleString("pt-BR")}`;
  -OFERTA VÁLIDA POR 1 DIA

  resultado.innerHTML = `
    <div class="result aprovado">
      <h3>🎉 Upgrade aprovado!</h3>
      <pre id="msg">${mensagem}</pre>

      <div class="actions">
        <button class="copy" onclick="copiar()">📋 Copiar mensagem</button>
        <button class="whatsapp" onclick="whatsapp()">💬 Enviar no WhatsApp</button>
      </div>
    </div>
  `;
}

function copiar() {
  const texto = document.getElementById("msg").innerText;
  navigator.clipboard.writeText(texto);
  alert("Mensagem copiada!");
}

function whatsapp() {
  const texto = encodeURIComponent(document.getElementById("msg").innerText);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}

const modeloEntradaInput = document.getElementById("modeloEntrada");
const valorFornecedorInput = document.getElementById("valorFornecedor");
const bateriaInput = document.getElementById("bateria");
const notaInput = document.getElementById("nota");
const reparoInput = document.getElementById("reparo");
const caixaInput = document.getElementById("caixa");
const corInput = document.getElementById("cor");
const desvalInput = document.getElementById("desval");
const avariaInput = document.getElementById("avaria");
const modeloDesejadoInput = document.getElementById("modeloDesejado");
const valorNovoInput = document.getElementById("valorNovo");
</script>

</body>
</html>
