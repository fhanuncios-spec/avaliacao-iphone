<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação de iPhone – Upgrade</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f2f2f7;
  padding: 20px;
}
.container {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  max-width: 420px;
  margin: auto;
}
h1 {
  text-align: center;
}
label {
  margin-top: 12px;
  display: block;
  font-weight: 600;
}
input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}
button {
  background: #000;
  color: #fff;
  margin-top: 20px;
}
.result {
  margin-top: 20px;
  padding: 16px;
  border-radius: 12px;
}
.aprovado {
  background: #e6f4ea;
  color: #137333;
}
.reprovado {
  background: #fce8e6;
  color: #a50e0e;
}
pre {
  white-space: pre-wrap;
  font-size: 15px;
}
</style>
</head>

<body>

<div class="container">
<h1>📱 Avaliação de iPhone</h1>

<label>Modelo de Entrada</label>
<input id="modeloEntrada" placeholder="Ex: iPhone 15 Pro Max - 256GB">

<label>Valor do Fornecedor (R$)</label>
<input id="valorFornecedor" type="number">

<label>Saúde da bateria (%)</label>
<input id="bateria" type="number">

<label>Possui Nota Fiscal?</label>
<select id="nota">
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Já teve reparo?</label>
<select id="reparo">
  <option>Não</option>
  <option>Sim</option>
</select>

<label>Possui caixa?</label>
<select id="caixa">
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Cor</label>
<select id="cor">
  <option>Preto</option>
  <option>Branco</option>
  <option>Azul</option>
  <option>Verde</option>
  <option>Lilás</option>
  <option>Amarelo</option>
  <option>Vermelho</option>
  <option>Rosa</option>
</select>

<label>Aplicar desvalorização geral de R$200?</label>
<select id="desval">
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Modelo desejado</label>
<input id="modeloDesejado" placeholder="Ex: iPhone 16 Pro Max - 256GB - Lacrado">

<label>Valor do iPhone desejado (R$)</label>
<input id="valorNovo" type="number">

<button onclick="avaliar()">Avaliar Upgrade</button>

<div id="resultado"></div>
</div>

<script>
function avaliar() {
  let valorFornecedor = Number(valorFornecedorInput.value);
  let bateria = Number(bateriaInput.value);
  let nota = notaInput.value;
  let reparo = reparoInput.value;
  let caixa = caixaInput.value;
  let cor = corInput.value;
  let desval = desvalInput.value;

  let modeloEntrada = modeloEntradaInput.value;
  let modeloDesejado = modeloDesejadoInput.value;
  let valorNovo = Number(valorNovoInput.value);

  let valorAvaliado = valorFornecedor;
  let aprovado = true;

  if (nota === "Não" || reparo === "Sim") {
    aprovado = false;
  }

  if (aprovado) {
    if (bateria < 86) valorAvaliado -= 300;
    else if (bateria <= 89) valorAvaliado -= 150;

    if (caixa === "Não") valorAvaliado -= 100;
    if (["Lilás","Amarelo","Vermelho","Rosa"].includes(cor)) valorAvaliado -= 100;
    if (desval === "Sim") valorAvaliado -= 200;
  }

  let resultado = document.getElementById("resultado");

  if (!aprovado || valorAvaliado <= 0) {
    resultado.innerHTML = `
      <div class="result reprovado">
        <h3>😞 Upgrade não aprovado</h3>
        <p>Infelizmente este aparelho não atende aos critérios para ser utilizado como entrada.</p>
      </div>
    `;
    return;
  }

  let diferenca = valorNovo - valorAvaliado;

  resultado.innerHTML = `
    <div class="result aprovado">
      <h3>🎉 Upgrade aprovado!</h3>
      <pre>
Olá, venho com uma boa notícia! 😊
Seu aparelho foi aceito como parte do valor para adquirir seu novo iPhone conosco. ✅

OFERTA UPGRADE 🔄

DE ENTRADA: ${modeloEntrada}
(valor avaliado: R$ ${valorAvaliado.toLocaleString("pt-BR")})

DESEJA ADQUIRIR: ${modeloDesejado}

DIFERENÇA DE VALOR: R$ ${diferenca.toLocaleString("pt-BR")}
      </pre>
    </div>
  `;
}

// atalhos
const modeloEntradaInput = document.getElementById("modeloEntrada");
const valorFornecedorInput = document.getElementById("valorFornecedor");
const bateriaInput = document.getElementById("bateria");
const notaInput = document.getElementById("nota");
const reparoInput = document.getElementById("reparo");
const caixaInput = document.getElementById("caixa");
const corInput = document.getElementById("cor");
const desvalInput = document.getElementById("desval");
const modeloDesejadoInput = document.getElementById("modeloDesejado");
const valorNovoInput = document.getElementById("valorNovo");
</script>

</body>
</html>
